<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Color a Fish</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="color">
  <!-- Step 1: fish selection screen -->
  <section class="fish-select" id="fishSelect">
    <div class="fish-select-inner">
      <h1>Pick Your Fish!</h1>
      <p class="subtitle">Tap a fish, then tap the button below to start coloring.</p>
      <div class="fish-grid" id="fishGrid"></div>
      <button class="big-btn primary accept-btn" id="acceptFish" disabled>Color This Fish</button>
    </div>
  </section>

  <!-- Step 2: coloring screen -->
  <div class="coloring-view" id="coloringView" hidden>
    <div class="topbar">
      <h1>Color Your Fish</h1>
      <button type="button" class="link-btn" id="changeFish">← Pick another fish</button>
    </div>

    <div class="workspace">
      <div class="canvas-wrap">
        <canvas id="canvas" width="900" height="600"></canvas>
      </div>

      <div class="tools">
        <div class="panel">
          <h3>Colors</h3>
          <div class="colors" id="colors"></div>
        </div>

        <div class="panel">
          <h3>Tool</h3>
          <div class="tool-row">
            <button class="tool-btn active" data-tool="brush">Brush</button>
            <button class="tool-btn" data-tool="fill">Fill</button>
            <button class="tool-btn" data-tool="sparkle">Sparkle</button>
            <button class="tool-btn" data-tool="sticker">Sticker</button>
            <button class="tool-btn" data-tool="eraser">Eraser</button>
          </div>
          <div class="size-row" style="margin-top:.6rem;">
            <label>Brush size: <span id="sizeLabel">18</span></label>
            <input type="range" id="size" min="4" max="60" value="18" />
          </div>
        </div>

        <div class="panel sticker-panel" id="stickerPanel" hidden>
          <h3>Stickers</h3>
          <div class="stickers" id="stickers"></div>
        </div>

        <div class="panel actions">
          <input type="text" id="fishName" placeholder="Name your fish (optional)" maxlength="20" />
          <button class="btn-undo" id="undo">Undo</button>
          <button class="btn-clear" id="clear">Start Over</button>
          <button class="btn-submit" id="submit">Send to Aquarium</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="look-up-banner" id="lookUpBanner" aria-hidden="true">
    <div class="arrow">⬆</div>
    <div class="msg">Look at the aquarium!<br><span class="sub">Your fish is swimming in now</span></div>
  </div>

  <script src="/color.js"></script>
</body>
</html>
